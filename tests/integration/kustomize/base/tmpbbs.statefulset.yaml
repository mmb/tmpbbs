---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tmpbbs
spec:
  template:
    spec:
      containers:
        - name: tmpbbs
          env:
            - name: TMPBBS_SUPERUSER_TRIPCODES
              value: c7a487a357
            - name: TMPBBS_TRIPCODE_SALT
              value: secret
          imagePullPolicy: Always
