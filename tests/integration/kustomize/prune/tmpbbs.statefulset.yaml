---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tmpbbs
spec:
  template:
    spec:
      containers:
        - name: tmpbbs
          env:
            - name: TMPBBS_CONFIG_FILE
              value:
            - name: TMPBBS_PRUNE_INTERVAL
              value: 1s
            - name: TMPBBS_PRUNE_MAX_AGE
              value: 5s
