---
# yamllint disable rule:line-length
name: Check
'on':
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: 6 6 * * 6

defaults:
  run:
    shell: bash

permissions:
  checks: write
  contents: read
  security-events: write

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker://rhysd/actionlint@sha256:6f03470d0152251d7f07f7c4dc019dbe7024c72cd952f839544c7798843efa8f
        with:
          args: -color
  committed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: crate-ci/committed@faeed42f2e10c244533a01525f13c4d8b6ce383f  # v1.11.1
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
      - name: Run ESLint
        run: npm install eslint @eslint/js globals && npx eslint
  go-generate:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install gotext and protoc
        run: |
          go install golang.org/x/text/cmd/gotext@latest
          PROTOC_VERSION=$(gh api repos/protocolbuffers/protobuf/releases/latest --jq '.tag_name[1:]')
          curl --location --remote-name "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          unzip -d "$HOME/.local" "protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          chmod +x "$HOME/.local/bin/protoc"
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
      - name: Check that go generated code is up to date
        run: |
          go generate ./...
          git diff --exit-code
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # v9.3.0
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee  # v1.0.4
        with:
          go-package: ./...
          go-version-file: go.mod
          go-version-input:
          output-format: sarif
          output-file: ${{ github.ref == 'refs/heads/main' && 'govulncheck.sarif' || '' }}
      - uses: github/codeql-action/upload-sarif@v4
        if: github.ref == 'refs/heads/main' && (success() || failure())
        with:
          sarif_file: govulncheck.sarif
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
  htmlhint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run HTMLhint
        run: |
          npm install --global htmlhint
          go run tmpbbs.go &
          sleep 3
          htmlhint http://localhost:8080/
          kill $!
  integration-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: tests/integration
    steps:
      - id: kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          registry: true
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."kind-registry:5000"]
            http = true
      - uses: actions/checkout@v7
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          tags: ${{ steps.kind.outputs.LOCAL_REGISTRY }}/tmpbbs:test
          build-args: |
            VERSION=test
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo
      - name: Run integration tests
        run: ginkgo --fail-on-pending --github-output -p -r --randomize-all
  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Kustomize
        run: kubectl kustomize kubernetes > kustomized.yaml
      - uses: docker://ghcr.io/yannh/kubeconform@sha256:85dbef6b4b312b99133decc9c6fc9495e9fc5f92293d4ff3b7e1b30f5611823c
        with:
          args: -strict -summary kustomized.yaml
  markdownlint-cli2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v23.2.0
        with:
          globs: '**/*.md'
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run ShellCheck
        run: find . -type f -name "*.sh" -exec shellcheck --format gcc {} +
  stylelint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
      - name: Run Stylelint
        run: npm install stylelint stylelint-config-standard && npx stylelint --formatter unix '**/*.css'
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          exit-code: '1'
          scan-type: fs
          format: sarif
          output: ${{ github.ref == 'refs/heads/main' && 'trivy.sarif' || '' }}
      - uses: github/codeql-action/upload-sarif@v4
        if: github.ref == 'refs/heads/main' && (success() || failure())
        with:
          sarif_file: trivy.sarif
  typos:
    runs-on: ubuntu-latest
    env:
      CLICOLOR: 1
    steps:
      - uses: actions/checkout@v7
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89  # v1.47.2
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run yamllint
        run: yamllint --format github .
