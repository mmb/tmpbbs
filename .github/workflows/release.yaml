---
# yamllint disable rule:line-length
name: Release a new version
'on':
  push:
    tags:
      - v*.*.*

defaults:
  run:
    shell: bash

env:
  DOCKER_HUB_IMAGE: mm62/tmpbbs

jobs:
  create-release:
    name: Build and publish a container image and create a GitHub release
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v7
      - id: metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: |
            ${{ env.DOCKER_HUB_IMAGE }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=semver,pattern={{raw}}
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm,linux/arm64
          build-args: |
            VERSION=${{ steps.metadata.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          push: true
      - uses: actions/attest@v4
        with:
          subject-name: index.docker.io/${{ env.DOCKER_HUB_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binaries
        run: >-
          ./build-release-binaries.sh "${{ steps.metadata.outputs.version }}"
          "${{ github.sha }}"
      - uses: actions/attest@v4
        with:
          subject-path: release/*
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          body: |
            ### Container Images

            - ${{ env.DOCKER_HUB_IMAGE }}:${{ steps.metadata.outputs.version }}
            - ghcr.io/${{ github.repository }}:${{ steps.metadata.outputs.version }}
          files: release/*
          generate_release_notes: true
