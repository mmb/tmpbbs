---
# yamllint disable rule:line-length
name: Release a new version
'on':
  push:
    tags:
      - v*.*.*

defaults:
  run:
    shell: bash

env:
  DOCKER_HUB_IMAGE: mm62/tmpbbs

jobs:
  create-release:
    name: Build and publish a container image and create a GitHub release
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v6
      - id: metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: |
            ${{ env.DOCKER_HUB_IMAGE }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=semver,pattern={{raw}}
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm,linux/arm64
          build-args: |
            VERSION=${{ steps.metadata.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          push: true
      - uses: actions/attest@v4
        with:
          subject-name: index.docker.io/${{ env.DOCKER_HUB_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binaries
        run: >-
          ./build-release-binaries.sh "${{ steps.metadata.outputs.version }}"
          "${{ github.sha }}"
      - uses: actions/attest@v4
        with:
          subject-path: release/*
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          body: |
            ### Container Images

            - ${{ env.DOCKER_HUB_IMAGE }}:${{ steps.metadata.outputs.version }}
            - ghcr.io/${{ github.repository }}:${{ steps.metadata.outputs.version }}
          files: release/*
          generate_release_notes: true
